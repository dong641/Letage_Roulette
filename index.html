<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Létage Roulette</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@500;700;900&display=swap" rel="stylesheet">
<style>
  * { margin:0; padding:0; box-sizing:border-box; }

  body {
    background: #fff;
    font-family: 'Noto Sans KR', sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 48px 24px 56px;
    gap: 28px;
  }

  .logo img {
    width: 148px;
    display: block;
    mix-blend-mode: multiply;
  }

  .wheel-wrap {
    position: relative;
    width: min(340px, 88vw);
    height: min(340px, 88vw);
  }

  canvas { display: block; border-radius: 50%; }

  .needle {
    position: absolute;
    top: -18px; left: 50%;
    transform: translateX(-50%);
    width: 0; height: 0;
    border-left: 10px solid transparent;
    border-right: 10px solid transparent;
    border-top: 26px solid #222;
    z-index: 10;
    filter: drop-shadow(0 2px 4px rgba(0,0,0,0.15));
  }

  .hub {
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%,-50%);
    width: 30px; height: 30px;
    border-radius: 50%;
    background: #fff;
    border: 2.5px solid #222;
    cursor: pointer;
    z-index: 10;
    transition: background 0.15s;
  }
  .hub:hover { background: #222; }

  button {
    width: 180px; height: 50px;
    background: #222;
    color: #fff;
    border: none;
    font-family: 'Noto Sans KR', sans-serif;
    font-size: 14px;
    font-weight: 700;
    letter-spacing: 0.15em;
    cursor: pointer;
    transition: background 0.2s;
  }
  button:hover { background: #444; }
  button:disabled { background: #ccc; cursor: not-allowed; }

  .count {
    font-size: 11px;
    color: #ccc;
    letter-spacing: 0.04em;
  }

  .piece {
    position: fixed; pointer-events: none; z-index: 999;
    animation: fall linear forwards;
  }
  @keyframes fall {
    from { transform: translateY(-10px) rotate(0); opacity: 1; }
    to   { transform: translateY(100vh) rotate(540deg); opacity: 0; }
  }
</style>
</head>

<script>
const segs = [

  { label:"까르보나라",             pct:20, bg:"#FCD34D", fg:"#7C5C00" },

const total = segs.reduce((s,x)=>s+x.pct,0);
segs.forEach(s => s.deg = (s.pct/total)*360);

const cv = document.getElementById('cv');
const ctx = cv.getContext('2d');
const SZ = Math.min(340, window.innerWidth * 0.88);
cv.width = SZ; cv.height = SZ;
const cx=SZ/2, cy=SZ/2, R=SZ/2-1;
const r2d = d => d*Math.PI/180;

function fitText(text, maxWidth, initSize) {
  let fs = initSize;
  ctx.font = `700 ${fs}px 'Noto Sans KR', sans-serif`;
  while (ctx.measureText(text).width > maxWidth && fs > 6) {
    fs -= 0.5;
    ctx.font = `700 ${fs}px 'Noto Sans KR', sans-serif`;
  }
  return fs;
}

function draw(rot) {
  ctx.clearRect(0,0,SZ,SZ);
  let a = r2d(rot-90);

  segs.forEach(s => {
    const ea = a + r2d(s.deg);
    ctx.beginPath(); ctx.moveTo(cx,cy); ctx.arc(cx,cy,R,a,ea); ctx.closePath();
    ctx.fillStyle = s.bg; ctx.fill();
    ctx.strokeStyle = '#fff'; ctx.lineWidth = 2; ctx.stroke();

    const mid = a + r2d(s.deg/2);
    const lr = R * 0.64;
    ctx.save();
    ctx.translate(cx+Math.cos(mid)*lr, cy+Math.sin(mid)*lr);
    ctx.rotate(mid + Math.PI/2);
    ctx.fillStyle = s.fg;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';

    const chordHalf = lr * Math.sin(r2d(s.deg/2));
    const maxW = Math.max(chordHalf * 1.7, 20);
    const lines = s.label.split('\n');
    const baseFontSize = s.deg > 45 ? 13 : s.deg > 30 ? 12 : s.deg > 20 ? 10.5 : 9.5;

    let fs = baseFontSize;
    lines.forEach(line => {
      const fit = fitText(line, maxW, fs);
      if (fit < fs) fs = fit;
    });

    ctx.font = `700 ${fs}px 'Noto Sans KR', sans-serif`;
    const lineH = fs * 1.35;
    const offsetY = lines.length > 1 ? -lineH * 0.5 : 0;
    lines.forEach((line, i) => {
      ctx.fillText(line, 0, offsetY + i * lineH);
    });

    ctx.restore();
    a = ea;
  });

  ctx.beginPath(); ctx.arc(cx,cy,R,0,Math.PI*2);
  ctx.strokeStyle = '#e5e5e5'; ctx.lineWidth = 2; ctx.stroke();

  ctx.beginPath(); ctx.arc(cx,cy,15,0,Math.PI*2);
  ctx.fillStyle='#fff'; ctx.fill();
  ctx.strokeStyle='#ddd'; ctx.lineWidth=2; ctx.stroke();
}

function winner(rot) {
  let pa = (360 - ((rot%360+360)%360) + 270) % 360, cum = 0;
  for (const s of segs) { cum += s.deg; if (pa < cum) return s; }
  return segs[segs.length-1];
}

let cur=0, spinning=false, spins=0;

function spin() {
  if (spinning) return;
  spinning = true;
  document.getElementById('btn').disabled = true;
  const extra = 1800 + Math.random()*1440;
  const dur = 4000 + Math.random()*800;
  const from = cur, t0 = performance.now();
  const ease = t => 1 - Math.pow(1-t, 4.5);

  (function frame(now) {
    const p = Math.min((now-t0)/dur, 1);
    cur = from + extra * ease(p);
    draw(cur);
    if (p < 1) { requestAnimationFrame(frame); return; }
    cur = (from + extra) % 360; draw(cur);
    spinning = false;
    document.getElementById('btn').disabled = false;
    spins++;
    document.getElementById('cnt').textContent = `총 ${spins}회`;
    confetti();
  })(t0);
}

function confetti() {
  const cols = ['#FF6B6B','#FCD34D','#A78BFA','#FBBF24','#6EE7B7','#F87171'];
  for (let i=0;i<70;i++) {
    const el = document.createElement('div');
    el.className = 'piece';
    const sz = 5+Math.random()*7;
    el.style.cssText = `left:${Math.random()*100}vw;top:-8px;width:${sz}px;height:${sz}px;background:${cols[~~(Math.random()*cols.length)]};border-radius:${Math.random()>.5?'50%':'2px'};animation-duration:${1.5+Math.random()*2}s;animation-delay:${Math.random()*0.6}s`;
    document.body.appendChild(el);
    setTimeout(()=>el.remove(), 3500);
  }
}

draw(0);
</script>
